<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lúmina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
            background: #0a0e1a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        .splash-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo glow ring */
        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #3b82f6,
                #8b5cf6,
                #3b82f6
            );
            opacity: 0.5;
            animation: spin 3s linear infinite;
            filter: blur(8px);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-icon {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 1;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }

        .app-name {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #93c5fd 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Loading bar */
        .loading-bar-track {
            width: 220px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 4px;
            animation: loading 1.4s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .subtitle {
            font-size: 10px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .church {
            font-size: 11px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img class="logo-icon" src="../LuminaICO.png" alt="Lúmina" onerror="this.style.display='none'" />
        </div>
        <div class="app-name">Lúmina</div>
        <div class="loading-bar-track">
            <div class="loading-bar-fill"></div>
        </div>
        <div class="subtitle">Cargando módulos...</div>
        <div class="church">Hecho en IPUC Las Delicias — Bogotá</div>
    </div>
</body>
</html>
